server:
  port: 8080  # 默认端口，各环境也可以按需覆写

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/admin_system_test?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: ${DB_USER:root}
    password: ${DB_PWD:123456}

# 测试环境同样可以开启 SQL 日志，或者使用 NoLogging 保持干净
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: info
    com.system: info